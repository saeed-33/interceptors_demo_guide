name: interceptors_demo
description: A demo app showcasing all Flutter interceptor patterns.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # Local Storage / Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  screen_protector: ^1.3.3  # prevent screenshot
  root_check: 0.0.2+1        # detect root/jailbreak

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Logging
  logger: ^2.0.2+1
  pretty_dio_logger: ^1.3.1

  # Error handling / Validation
  dartz: ^0.10.1
  formz: ^0.7.0

  # Performance
  flutter_cache_manager: ^3.3.1

  # Utils
  package_info_plus: ^5.0.1
  get_it: ^7.6.7            # Service Locator / DI
  injectable: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
